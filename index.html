<!doctype html>
<html lang="en" class="scroll-smooth">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VVCE Connect</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Tailwind CSS CDN -->
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>

  <!-- Supabase CDN (Using unpkg to avoid jsdelivr blocking issues) -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Leaflet CSS & JS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css?v=5">
</head>

<body class="selection:bg-white/20">
  <div id="page-load-overlay"
    style="position: fixed; inset: 0; z-index: 9998; background: #000000; opacity: 1; transition: opacity 0.6s ease, visibility 0.6s ease;">
  </div>
  <div class="relative min-h-screen w-full flex flex-col" id="app">
    <!-- Navbar injected here by app.js -->
    <header id="header"></header>
    <!-- Page Content injected here -->
    <main id="content" class="flex-1 flex flex-col w-full"></main>

    <!-- Global Footer -->
    <footer class="w-full relative z-10 py-12 mt-auto reveal-card"
      style="background: black; border-top: 1px solid rgba(0, 0, 0, 0.1);">
      <div class="max-w-[1280px] mx-auto px-6 lg:px-8">
        <div class="flex flex-col md:flex-row justify-between items-center gap-8 mb-8">
          <div class="text-center md:text-left">
            <p class="font-syne font-[800] text-[24px] text-gradient-emerald mb-2 tracking-tight">VVCE Connect</p>
            <p class="font-dm-sans font-[300] text-[14px] text-[var(--text-muted)]">Designed with an Antigravity
              aesthetic for engineering students.</p>
          </div>

          <div class="flex flex-wrap justify-center gap-6">
            <a href="#home" class="footer-link">Home</a>
            <a href="#events" class="footer-link">Events</a>
            <a href="#community" class="footer-link">Community</a>
            <a href="#departments" class="footer-link">Directory</a>
          </div>
        </div>

        <div
          class="pt-6 border-t border-[rgba(16,185,129,0.08)] text-center md:text-left flex flex-col md:flex-row justify-between items-center gap-4">
          <p class="font-dm-sans text-[0.78rem] text-[rgba(240,246,255,0.3)]">&copy; 2026 Vidyavardhaka College of
            Engineering</p>
          <div class="flex gap-4">
            <a href="#" class="footer-link" style="font-size: 0.78rem;">Privacy</a>
            <a href="#" class="footer-link" style="font-size: 0.78rem;">Terms</a>
          </div>
        </div>
      </div>
    </footer>
  </div>

  <!-- Application Scripts -->
  <script src="js/supabaseClient.js"></script>
  <script src="js/translations.js"></script>
  <script src="js/data.js?v=2"></script>
  <script src="js/state.js"></script>
  <script src="js/pages.js?v=4"></script>
  <script src="js/app.js?v=6"></script>
  <script>
    window.addEventListener('load', () => {
      const overlay = document.getElementById('page-load-overlay');
      if (overlay) {
        overlay.style.opacity = '0';
        overlay.style.visibility = 'hidden';
      }
    });
  </script>
</body>

</html>
